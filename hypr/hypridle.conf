# hypridle.conf — System idle manager configuration (dim at 2min, suspend at 3min)
# For more info, refer to https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = pidof hyprlock || hyprlock # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen back on post-suspend.
}

# Dim screen at 2 minutes (120 seconds)
listener {
    timeout = 120
    on-timeout = brightnessctl -s set 10%       # set monitor backlight to 10%
    on-resume = brightnessctl -r                # restore monitor backlight
}

# Suspend system at 3 minutes (180 seconds)
listener {
    timeout = 180
    on-timeout = systemctl suspend              # suspend pc
}
